version: "3.9"

services:
  db:
    image: postgres:15-alpine
    container_name: failsafe_db
    environment:
      POSTGRES_DB: failsafe_db
      POSTGRES_USER: failsafe_user
      POSTGRES_PASSWORD: failsafe_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U failsafe_user -d failsafe_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: failsafe_backend
    environment:
      DATABASE_URL: postgresql://failsafe_user:failsafe_pass@db:5432/failsafe_db
      SECRET_KEY: change-this-in-production-please
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ml_artifacts:/app/ml_pipeline/artifacts

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: failsafe_frontend
    environment:
      REACT_APP_API_URL: http://localhost:8000/api
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
  ml_artifacts:
